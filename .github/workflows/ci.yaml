name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write  # for trivy SARIF upload

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-manifests:
    name: Lint Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          find k8s/ -name "*.yaml" -not -name "helm-values.yaml" \
            -not -path "*/secrets.yaml" \
            | xargs kubeval --ignore-missing-schemas --strict

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm values (dry-run template)
        run: |
          # Add Helm repos
          helm repo add kong https://charts.konghq.com
          helm repo add dapr https://dapr.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

          # Lint each chart with its values
          helm lint kong/ingress -f k8s/kong/helm-values.yaml --set ingressController.installCRDs=false 2>/dev/null || true
          helm lint bitnami/keycloak -f k8s/keycloak/helm-values.yaml 2>/dev/null || true
          helm lint jetstack/cert-manager -f k8s/cert-manager/helm-values.yaml 2>/dev/null || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # Don't fail build on scan findings (set to 1 to block)

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run checkov (policy as code)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true
          output_format: cli

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint-manifests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/sample-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
