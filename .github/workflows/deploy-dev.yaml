name: Deploy to Dev

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # for OIDC-based cloud authentication

concurrency:
  group: deploy-dev
  cancel-in-progress: false   # Don't cancel in-progress deploys

env:
  ENVIRONMENT: dev
  KUBE_NAMESPACE_APPS: apps
  KUBE_NAMESPACE_KONG: kong
  KUBE_NAMESPACE_KEYCLOAK: keycloak
  IMAGE_TAG: ${{ github.event.inputs.image_tag || format('sha-{0}', github.sha) }}

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure (dev)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBECONFIG }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repos
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo add dapr https://dapr.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/namespaces.yaml

      - name: Deploy cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --values k8s/cert-manager/helm-values.yaml \
            --wait --timeout 5m

      - name: Apply cert-manager ClusterIssuers
        run: kubectl apply -f k8s/cert-manager/cluster-issuer.yaml

      - name: Deploy Kong Ingress Controller
        run: |
          helm upgrade --install kong kong/ingress \
            --namespace kong \
            --values k8s/kong/helm-values.yaml \
            --wait --timeout 5m

      - name: Apply Kong plugins
        run: kubectl apply -f k8s/kong/plugins/

      - name: Deploy Dapr
        run: |
          helm upgrade --install dapr dapr/dapr \
            --namespace dapr-system \
            --values k8s/dapr/helm-values.yaml \
            --wait --timeout 10m

      - name: Apply Dapr components & config
        run: |
          kubectl apply -f k8s/dapr/dapr-configuration.yaml
          kubectl apply -f k8s/dapr/components/

      - name: Deploy Keycloak
        run: |
          kubectl apply -f k8s/keycloak/realm-config.yaml
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak \
            --values k8s/keycloak/helm-values.yaml \
            --set auth.existingSecret=keycloak-admin-secret \
            --wait --timeout 10m

  deploy-apps:
    name: Deploy Applications (dev)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBECONFIG }}

      - name: Deploy sample-app
        run: |
          # Substitute image tag in deployment
          sed -i "s|sample-app:latest|ghcr.io/${{ github.repository }}/sample-app:${{ env.IMAGE_TAG }}|g" \
            k8s/apps/sample-app/deployment.yaml

          kubectl apply -f k8s/apps/sample-app/service.yaml
          kubectl apply -f k8s/apps/sample-app/deployment.yaml
          kubectl apply -f k8s/apps/sample-app/ingress.yaml
          kubectl apply -f k8s/apps/sample-app/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-app \
            --namespace apps --timeout=5m

      - name: Smoke test
        run: |
          KONG_IP=$(kubectl get svc -n kong kong-kong-proxy \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "Kong proxy IP: $KONG_IP"
          # Add your smoke test curl commands here once you have an external IP
