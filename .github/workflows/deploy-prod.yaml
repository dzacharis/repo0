name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234)"
        required: true
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  ENVIRONMENT: prod
  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:
  validate-input:
    name: Validate Deployment Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "::error::Confirmation string does not match. Aborting."
            exit 1
          fi
          echo "Confirmation validated. Deploying ${{ env.IMAGE_TAG }} to production."

  deploy-infrastructure:
    name: Deploy Infrastructure (prod)
    runs-on: ubuntu-latest
    needs: validate-input
    environment: prod    # GitHub environment with required reviewers
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repos
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo add dapr https://dapr.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/namespaces.yaml

      - name: Deploy cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --values k8s/cert-manager/helm-values.yaml \
            --wait --timeout 5m

      - name: Apply cert-manager ClusterIssuers
        run: kubectl apply -f k8s/cert-manager/cluster-issuer.yaml

      - name: Deploy Kong Ingress Controller
        run: |
          helm upgrade --install kong kong/ingress \
            --namespace kong \
            --values k8s/kong/helm-values.yaml \
            --set replicaCount=3 \
            --wait --timeout 5m

      - name: Apply Kong plugins
        run: kubectl apply -f k8s/kong/plugins/

      - name: Deploy Dapr (HA)
        run: |
          helm upgrade --install dapr dapr/dapr \
            --namespace dapr-system \
            --values k8s/dapr/helm-values.yaml \
            --set global.ha.enabled=true \
            --wait --timeout 10m

      - name: Apply Dapr components & config
        run: |
          kubectl apply -f k8s/dapr/dapr-configuration.yaml
          kubectl apply -f k8s/dapr/components/

      - name: Deploy Keycloak (HA)
        run: |
          kubectl apply -f k8s/keycloak/realm-config.yaml
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak \
            --values k8s/keycloak/helm-values.yaml \
            --set replicaCount=3 \
            --wait --timeout 10m

  deploy-apps:
    name: Deploy Applications (prod)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Blue/Green deploy sample-app
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/sample-app:${{ env.IMAGE_TAG }}"

          sed -i "s|sample-app:latest|${IMAGE}|g" \
            k8s/apps/sample-app/deployment.yaml

          kubectl apply -f k8s/apps/sample-app/service.yaml
          kubectl apply -f k8s/apps/sample-app/deployment.yaml
          kubectl apply -f k8s/apps/sample-app/ingress.yaml
          kubectl apply -f k8s/apps/sample-app/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-app \
            --namespace apps --timeout=10m

      - name: Post-deploy health check
        run: |
          echo "Verifying deployment health..."
          kubectl get pods -n apps -l app=sample-app
          kubectl get hpa -n apps sample-app

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment of ${{ env.IMAGE_TAG }} completed successfully."
          # Add Slack/Teams/PagerDuty notification here

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/sample-app --namespace apps
          kubectl rollout status deployment/sample-app --namespace apps --timeout=5m
