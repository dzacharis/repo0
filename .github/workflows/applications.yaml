name: "Applications"

# Builds, tests, and deploys application workloads.
# Triggered only when app source or manifests change — never on infra-only changes.
# Build + unit test on every push/PR; deploy-dev on merge; deploy-prod is manual + gated.

on:
  push:
    branches: [master, main]
    paths:
      - "k8s/apps/**"
      - "k8s/kustomize/**"
      - "src/**"
      - "Dockerfile"
      - "Dockerfile.*"
  pull_request:
    branches: [master, main]
    paths:
      - "k8s/apps/**"
      - "k8s/kustomize/**"
      - "src/**"
      - "Dockerfile"
      - "Dockerfile.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to current SHA)"
        required: false
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  contents: write     # kustomize edit set image commit-back
  packages: write     # push to GHCR
  id-token: write     # OIDC for cloud registries
  security-events: write

concurrency:
  group: apps-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sample-app
  IMAGE_TAG: ${{ github.event.inputs.image_tag || format('sha-{0}', github.sha) }}

jobs:
  # ── 1. Lint & validate app manifests ────────────────────────────────────────
  validate-manifests:
    name: Validate App Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeconform /usr/local/bin

      - name: Validate app manifests
        run: |
          find k8s/apps/ -name "*.yaml" \
            | xargs kubeconform --ignore-missing-schemas --strict -

      - name: Validate Kustomize overlays
        run: |
          kubectl kustomize k8s/kustomize/overlays/dev \
            | kubeconform --ignore-missing-schemas --strict -
          kubectl kustomize k8s/kustomize/overlays/prod \
            | kubeconform --ignore-missing-schemas --strict -

  # ── 2. Unit tests — Transform Hub ────────────────────────────────────────────
  test-transform-hub:
    name: Test · Transform Hub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/transform-hub
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/transform-hub/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: transform-hub-coverage
          path: src/transform-hub/coverage.xml

  # ── 2b. Unit tests — Ingestion Worker ─────────────────────────────────────────
  test-ingestion-worker:
    name: Test · Ingestion Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ingestion-worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/ingestion-worker/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingestion-worker-coverage
          path: src/ingestion-worker/coverage.xml

  # ── 3. Build & push container image ─────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [validate-manifests, test-transform-hub, test-ingestion-worker]
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true     # SLSA provenance attestation
          sbom: true           # attach SBOM to image

      - name: Scan built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL
          exit-code: "1"       # block deploy on critical CVEs

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-app-image

  # ── 4. Deploy to Dev ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy Applications (dev)
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBECONFIG }}

      - name: Update kustomize image tag
        run: |
          cd k8s/kustomize/overlays/dev
          # Requires kustomize CLI
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz \
            | tar xz && sudo mv kustomize /usr/local/bin
          kustomize edit set image sample-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Apply dev overlay
        run: kubectl kustomize k8s/kustomize/overlays/dev | kubectl apply -f -

      - name: Apply Dapr OpenSearch binding
        run: kubectl apply -f k8s/opensearch/dapr-binding.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-app \
            --namespace apps --timeout=5m

      - name: Smoke test
        run: |
          echo "Waiting for Kong proxy IP..."
          for i in $(seq 1 12); do
            KONG_IP=$(kubectl get svc -n kong kong-kong-proxy \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            [ -n "$KONG_IP" ] && break
            sleep 5
          done
          echo "Kong IP: ${KONG_IP:-pending}"
          # curl -sf "http://${KONG_IP}/health" || echo "Health check skipped (no IP yet)"

      - name: Commit updated kustomization back to repo
        run: |
          git config user.email "ci-bot@example.com"
          git config user.name "CI Bot"
          git add k8s/kustomize/overlays/dev/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update dev sample-app image to ${{ env.IMAGE_TAG }} [skip ci]"
          git push

  # ── 5. Deploy to Prod ────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy Applications (prod)
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod'
    environment: prod   # requires reviewer approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Install kustomize
        run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz \
            | tar xz && sudo mv kustomize /usr/local/bin

      - name: Update kustomize image tag (prod)
        run: |
          cd k8s/kustomize/overlays/prod
          kustomize edit set image sample-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Apply prod overlay
        run: kubectl kustomize k8s/kustomize/overlays/prod | kubectl apply -f -

      - name: Apply Dapr OpenSearch binding
        run: kubectl apply -f k8s/opensearch/dapr-binding.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-app \
            --namespace apps --timeout=10m

      - name: Extended smoke tests
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n apps -l app=sample-app
          echo "=== HPA status ==="
          kubectl get hpa -n apps sample-app
          echo "=== Recent events ==="
          kubectl get events -n apps --sort-by='.lastTimestamp' | tail -10

      - name: Commit updated kustomization back to repo
        run: |
          git config user.email "ci-bot@example.com"
          git config user.name "CI Bot"
          git add k8s/kustomize/overlays/prod/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update prod sample-app image to ${{ env.IMAGE_TAG }} [skip ci]"
          git push

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/sample-app --namespace apps
          kubectl rollout status deployment/sample-app --namespace apps --timeout=5m

      - name: Notify success
        if: success()
        run: |
          echo "Production deployment of ${{ env.IMAGE_TAG }} succeeded."
          # Add Slack / Teams / PagerDuty notification here
