apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: apps
  labels:
    app: sample-app
spec:
  type: ClusterIP
  selector:
    app: sample-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: apps
  labels:
    app: sample-app
