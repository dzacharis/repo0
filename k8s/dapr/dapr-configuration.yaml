apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: dapr-config
  namespace: apps
spec:
  tracing:
    samplingRate: "1"
    zipkin:
      endpointAddress: http://zipkin.observability.svc.cluster.local:9411/api/v2/spans
  metric:
    enabled: true
  logging:
    apiLogging:
      enabled: true
      obfuscateHTTPBodies: false
  httpPipeline:
    handlers:
      - name: oauth2clientcredentials
        type: middleware.http.oauth2clientcredentials
  appHttpPipeline:
    handlers: []
  features:
    - name: ServiceInvocationStreaming
      enabled: true
