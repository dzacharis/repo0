# Kong OIDC plugin connecting to Keycloak
# Requires kong-oidc plugin or OpenID Connect (Enterprise) plugin
# This example uses the community kong-oidc plugin
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: oidc-keycloak
  namespace: apps
plugin: oidc
config:
  client_id: kong
  client_secret: ""  # Set via Secret reference in production
  discovery: http://keycloak.keycloak.svc.cluster.local:8080/realms/myrealm/.well-known/openid-configuration
  introspection_endpoint: http://keycloak.keycloak.svc.cluster.local:8080/realms/myrealm/protocol/openid-connect/token/introspect
  bearer_only: "yes"
  realm: myrealm
  redirect_uri_path: /callback
  scope: openid
  response_type: code
  ssl_verify: "no"
  token_endpoint_auth_method: client_secret_post
