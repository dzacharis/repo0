# AWS EKS-specific Keycloak Helm value overrides
# Uses RDS PostgreSQL instead of bundled Postgres

# Disable bundled PostgreSQL — use RDS
postgresql:
  enabled: false

# Point to RDS endpoint (from Terraform output: rds_endpoint)
externalDatabase:
  host: ""        # Set to: <rds_endpoint> (without port, e.g. xxx.rds.amazonaws.com)
  port: 5432
  database: keycloak
  user: keycloak
  existingSecret: keycloak-postgresql-secret
  existingSecretPasswordKey: password

extraEnvVars:
  - name: KC_PROXY
    value: edge
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: KEYCLOAK_EXTRA_ARGS
    value: "--import-realm"

# Spread across AZs
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: keycloak
