# Azure Key Vault Secrets Provider (CSI driver — built into AKS)
# Maps Key Vault secrets to Kubernetes secrets automatically
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: platform-keyvault-secrets
  namespace: apps
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: ""        # terraform output workload_identity_client_id
    keyvaultName: ""    # Key Vault name from terraform
    tenantId: ""        # terraform output workload_identity_tenant_id
    objects: |
      array:
        - |
          objectName: keycloak-admin-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: keycloak-db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-primary-key
          objectType: secret
          objectVersion: ""
  secretObjects:
    - secretName: keycloak-admin-secret
      type: Opaque
      data:
        - objectName: keycloak-admin-password
          key: admin-password
    - secretName: keycloak-postgresql-secret
      type: Opaque
      data:
        - objectName: keycloak-db-password
          key: password
    - secretName: redis-secret
      type: Opaque
      data:
        - objectName: redis-primary-key
          key: redis-password
