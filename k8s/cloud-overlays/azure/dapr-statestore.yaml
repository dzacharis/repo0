# AKS override: Dapr components using Azure Cache for Redis (TLS on port 6380)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: apps
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: ""    # Set to: "<redis_hostname>:6380" (terraform output redis_hostname + ssl_port)
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: redis-password
    - name: enableTLS
      value: "true"   # Azure Cache for Redis uses TLS on port 6380
    - name: actorStateStore
      value: "true"
    - name: maxRetries
      value: "3"
auth:
  secretStore: kubernetes
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: apps
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: ""    # Set to: "<redis_hostname>:6380"
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: redis-password
    - name: enableTLS
      value: "true"
auth:
  secretStore: kubernetes
---
# Dapr Secret Store using Azure Key Vault + Workload Identity
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: azure-keyvault
  namespace: apps
spec:
  type: secretstores.azure.keyvault
  version: v1
  metadata:
    - name: vaultName
      value: ""    # Set to Key Vault name (from terraform output key_vault_uri)
    - name: azureTenantId
      value: ""    # terraform output workload_identity_tenant_id
    - name: azureClientId
      value: ""    # terraform output workload_identity_client_id
