# GKE override: Dapr state store using Google Memorystore Redis
# Apply after base components: kubectl apply -f k8s/cloud-overlays/gcp/dapr-statestore.yaml
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: apps
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: ""   # Set to: <MEMORYSTORE_HOST>:6379 (terraform output: memorystore_host)
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: redis-password
    - name: enableTLS
      value: "true"   # Memorystore supports TLS on port 6378
    - name: actorStateStore
      value: "true"
    - name: maxRetries
      value: "3"
auth:
  secretStore: kubernetes
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: apps
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: ""   # Set to: <MEMORYSTORE_HOST>:6379
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: redis-password
    - name: enableTLS
      value: "true"
auth:
  secretStore: kubernetes
