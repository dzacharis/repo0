# NOTE: These are example Secrets. In production, use Sealed Secrets,
# External Secrets Operator, or a Vault integration — NEVER commit real secrets.
#
# Generate with:
#   kubectl create secret generic keycloak-admin-secret \
#     --from-literal=admin-password='<strong-password>' \
#     --namespace keycloak --dry-run=client -o yaml
#
# Or use Sealed Secrets:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: keycloak
  annotations:
    # Managed by: external-secrets or sealed-secrets in production
    secret-management: "manual-placeholder"
type: Opaque
stringData:
  # REPLACE with actual value — never commit real credentials
  admin-password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgresql-secret
  namespace: keycloak
type: Opaque
stringData:
  postgres-password: "CHANGE_ME"
  password: "CHANGE_ME"
