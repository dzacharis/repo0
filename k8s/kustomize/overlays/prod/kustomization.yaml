apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patchesStrategicMerge:
  - patches/replicas-prod.yaml

# IMAGE_TAG is substituted by the deploy pipeline via envsubst or kustomize edit set image
images:
  - name: sample-app
    newName: ghcr.io/dzacharis/repo0/sample-app
    newTag: latest   # overridden at deploy time: kustomize edit set image sample-app=...:$IMAGE_TAG
