apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/replicas-prod.yaml

# IMAGE_TAG is substituted by the deploy pipeline via: kustomize edit set image sample-app=...:$IMAGE_TAG
images:
  - name: sample-app
    newName: ghcr.io/dzacharis/repo0/sample-app
    newTag: sha-placeholder
