apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: apps
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: sample-app
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
